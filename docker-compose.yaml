services:
  api:
    build: ./api/
    ports:
      - "8080:8080" 
    volumes:
      - ./files:/files
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    
  db:
    image: postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: admin
    ports:
      - "5432:5432"
    shm_size: 128mb
    volumes:
      - ./db/initdb/:/docker-entrypoint-initdb.d/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 3s
      timeout: 3s
      retries: 5

  adminer:
    image: adminer
    restart: always
    environment:
      ADMINER_DESIGN: win98
    ports:
      - "8003:8080"

  cdn:
    build:
      context: ./cdn
      dockerfile: ./Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./files:/usr/share/nginx/html/files/
      - ./cdn/public/:/usr/share/nginx/html/public/
